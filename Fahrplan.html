<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Fahrgemeinschaft Jugendcamp</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: #f3f5f7;
      color: #222;
    }

    .container {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
    }

    h1 {
      margin-top: 0;
      text-align: center;
      color: #185a37;
    }

    .hinweis {
      margin-bottom: 20px;
      text-align: center;
      color: #555;
    }

    .status {
      display: none;
      margin-bottom: 20px;
      padding: 12px 15px;
      border-radius: 8px;
      font-weight: bold;
      white-space: pre-wrap;
    }

    .status.info {
      display: block;
      color: #174b70;
      background: #dceeff;
      border: 1px solid #94c9ef;
    }

    .status.erfolg {
      display: block;
      color: #155724;
      background: #d4edda;
      border: 1px solid #9ed4aa;
    }

    .status.fehler {
      display: block;
      color: #721c24;
      background: #f8d7da;
      border: 1px solid #eba2a8;
    }

    .karte {
      margin-bottom: 25px;
      padding: 20px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 3px 12px rgba(0, 0, 0, 0.08);
    }

    .formular-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 15px;
    }

    .formular-gruppe {
      display: flex;
      flex-direction: column;
    }

    .formular-gruppe.ganz {
      grid-column: 1 / -1;
    }

    label {
      margin-bottom: 6px;
      font-weight: bold;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 11px;
      font: inherit;
      background: white;
      border: 1px solid #bbb;
      border-radius: 7px;
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: 2px solid #7bc69d;
      border-color: #287348;
    }

    textarea {
      min-height: 80px;
      resize: vertical;
    }

    .button-zeile {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    button {
      padding: 11px 18px;
      font: inherit;
      font-weight: bold;
      cursor: pointer;
      border: 0;
      border-radius: 7px;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .button-speichern {
      color: white;
      background: #287348;
    }

    .button-speichern:hover {
      background: #1e5e39;
    }

    .button-abbrechen {
      color: #222;
      background: #e2e5e8;
    }

    .button-loeschen {
      padding: 7px 10px;
      color: white;
      background: #b4232d;
    }

    .button-bearbeiten {
      padding: 7px 10px;
      color: white;
      background: #276a9c;
    }

    .ladeanzeige {
      padding: 25px;
      text-align: center;
      color: #666;
    }

    .tag {
      margin-bottom: 28px;
    }

    .tag h2 {
      margin: 0 0 12px;
      padding: 10px 14px;
      color: white;
      background: #287348;
      border-radius: 8px;
    }

    .richtungs-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .richtung {
      min-width: 0;
      padding: 14px;
      background: #f8f9fa;
      border: 1px solid #d8dcdf;
      border-radius: 9px;
    }

    .richtung h3 {
      margin: 0 0 12px;
    }

    .fahrt {
      margin-bottom: 12px;
      padding: 13px;
      background: white;
      border-left: 5px solid #287348;
      border-radius: 7px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.06);
    }

    .fahrt:last-child {
      margin-bottom: 0;
    }

    .fahrt-name {
      margin-bottom: 7px;
      font-size: 1.06rem;
      font-weight: bold;
    }

    .fahrt-zeile {
      margin: 4px 0;
      overflow-wrap: anywhere;
    }

    .fahrt-aktionen {
      display: flex;
      gap: 8px;
      margin-top: 11px;
    }

    .leer {
      padding: 12px;
      color: #777;
      text-align: center;
      font-style: italic;
      background: white;
      border: 1px dashed #bbb;
      border-radius: 7px;
    }

    @media (max-width: 750px) {
      body {
        padding: 10px;
      }

      .formular-grid,
      .richtungs-grid {
        grid-template-columns: 1fr;
      }

      .karte {
        padding: 15px;
      }
    }
  </style>
</head>

<body>
  <main class="container">
    <h1>Fahrgemeinschaft Jugendcamp</h1>

    <p class="hinweis">
      Hier können Hin- und Rückfahrten von Montag bis Sonntag eingetragen werden.
    </p>

    <div id="status" class="status"></div>

    <section class="karte">
      <h2 id="formularTitel">Fahrt eintragen</h2>

      <form id="fahrtFormular">
        <div class="formular-grid">
          <div class="formular-gruppe">
            <label for="name">Name der Fahrerin / des Fahrers</label>
            <input
              id="name"
              name="name"
              type="text"
              maxlength="80"
              required
              placeholder="Zum Beispiel Christian Walter"
            >
          </div>

          <div class="formular-gruppe">
            <label for="telefon">Telefonnummer</label>
            <input
              id="telefon"
              name="telefon"
              type="tel"
              maxlength="40"
              placeholder="Zum Beispiel 0171 1234567"
            >
          </div>

          <div class="formular-gruppe">
            <label for="tag">Tag</label>
            <select id="tag" name="tag" required>
              <option value="montag">Montag</option>
              <option value="dienstag">Dienstag</option>
              <option value="mittwoch">Mittwoch</option>
              <option value="donnerstag">Donnerstag</option>
              <option value="freitag">Freitag</option>
              <option value="samstag">Samstag</option>
              <option value="sonntag">Sonntag</option>
            </select>
          </div>

          <div class="formular-gruppe">
            <label for="richtung">Fahrtrichtung</label>
            <select id="richtung" name="richtung" required>
              <option value="hinfahrt">Hinfahrt</option>
              <option value="rueckfahrt">Rückfahrt</option>
            </select>
          </div>

          <div class="formular-gruppe">
            <label for="uhrzeit">Uhrzeit</label>
            <input
              id="uhrzeit"
              name="uhrzeit"
              type="time"
              required
            >
          </div>

          <div class="formular-gruppe">
            <label for="plaetze">Freie Plätze</label>
            <input
              id="plaetze"
              name="plaetze"
              type="number"
              min="0"
              max="20"
              value="1"
              required
            >
          </div>

          <div class="formular-gruppe ganz">
            <label for="kinder">Mitfahrende Kinder</label>
            <input
              id="kinder"
              name="kinder"
              type="text"
              maxlength="200"
              placeholder="Zum Beispiel Anton und Oskar"
            >
          </div>

          <div class="formular-gruppe ganz">
            <label for="bemerkung">Bemerkung</label>
            <textarea
              id="bemerkung"
              name="bemerkung"
              maxlength="500"
              placeholder="Zum Beispiel Treffpunkt, Rückfragen oder Besonderheiten"
            ></textarea>
          </div>
        </div>

        <div class="button-zeile">
          <button
            id="speichernButton"
            class="button-speichern"
            type="submit"
            disabled
          >
            Fahrt speichern
          </button>

          <button
            id="abbrechenButton"
            class="button-abbrechen"
            type="button"
            hidden
          >
            Bearbeitung abbrechen
          </button>
        </div>
      </form>
    </section>

    <section class="karte">
      <h2>Alle Fahrten</h2>

      <div id="fahrtenListe" class="ladeanzeige">
        Verbindung zu Firebase wird hergestellt …
      </div>
    </section>
  </main>

  <script type="module">
    /*
     * Firebase-Module
     *
     * Alle Firebase-Imports müssen dieselbe Versionsnummer verwenden.
     */
    import {
      initializeApp
    } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";

    import {
      getAuth,
      signInAnonymously,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-auth.js";

    import {
      getFirestore,
      collection,
      doc,
      setDoc,
      deleteDoc,
      onSnapshot,
      serverTimestamp,
      query,
      orderBy
    } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";


    /*
     * ---------------------------------------------------------
     * HIER DEINE FIREBASE-KONFIGURATION EINTRAGEN
     * ---------------------------------------------------------
     */
    const firebaseConfig = {
      apiKey: "DEIN_API_KEY",
      authDomain: "DEIN_PROJEKT.firebaseapp.com",
      projectId: "DEIN_PROJEKT",
      storageBucket: "DEIN_PROJEKT.firebasestorage.app",
      messagingSenderId: "DEINE_MESSAGING_SENDER_ID",
      appId: "DEINE_APP_ID"
    };


    /*
     * Name der Firestore-Collection
     */
    const COLLECTION_NAME = "fahrgemeinschaften";


    /*
     * Firebase starten
     */
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);


    /*
     * HTML-Elemente
     */
    const statusElement = document.getElementById("status");
    const formular = document.getElementById("fahrtFormular");
    const formularTitel = document.getElementById("formularTitel");
    const speichernButton = document.getElementById("speichernButton");
    const abbrechenButton = document.getElementById("abbrechenButton");
    const fahrtenListe = document.getElementById("fahrtenListe");

    const nameFeld = document.getElementById("name");
    const telefonFeld = document.getElementById("telefon");
    const tagFeld = document.getElementById("tag");
    const richtungFeld = document.getElementById("richtung");
    const uhrzeitFeld = document.getElementById("uhrzeit");
    const plaetzeFeld = document.getElementById("plaetze");
    const kinderFeld = document.getElementById("kinder");
    const bemerkungFeld = document.getElementById("bemerkung");


    /*
     * Enthält die ursprüngliche Dokument-ID,
     * wenn ein Eintrag bearbeitet wird.
     */
    let bearbeiteteDokumentId = null;

    /*
     * Wird true, sobald Firebase Authentication fertig ist.
     */
    let firebaseBereit = false;


    /*
     * Reihenfolge der Tage
     */
    const tage = [
      {
        id: "montag",
        text: "Montag"
      },
      {
        id: "dienstag",
        text: "Dienstag"
      },
      {
        id: "mittwoch",
        text: "Mittwoch"
      },
      {
        id: "donnerstag",
        text: "Donnerstag"
      },
      {
        id: "freitag",
        text: "Freitag"
      },
      {
        id: "samstag",
        text: "Samstag"
      },
      {
        id: "sonntag",
        text: "Sonntag"
      }
    ];


    /*
     * Statusmeldung anzeigen
     */
    function zeigeStatus(text, typ = "info") {
      statusElement.textContent = text;
      statusElement.className = `status ${typ}`;
    }


    /*
     * Statusmeldung ausblenden
     */
    function versteckeStatus() {
      statusElement.textContent = "";
      statusElement.className = "status";
    }


    /*
     * Text sicher als HTML ausgeben.
     * Verhindert, dass eingegebener HTML-Code ausgeführt wird.
     */
    function escapeHtml(wert) {
      return String(wert ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }


    /*
     * Text in eine gültige Dokument-ID umwandeln.
     */
    function normalisiereDokumentId(text) {
      return String(text)
        .trim()
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/ß/g, "ss")
        .replace(/[^a-z0-9_-]+/g, "_")
        .replace(/^_+|_+$/g, "")
        .substring(0, 120);
    }


    /*
     * Feste Dokument-ID erzeugen.
     *
     * Beispiel:
     * christian_walter_montag_hinfahrt
     *
     * Derselbe Name, Tag und dieselbe Richtung ergeben immer
     * dieselbe ID. Dadurch aktualisiert setDoc() das vorhandene
     * Dokument, statt immer ein neues anzulegen.
     */
    function erzeugeDokumentId(name, tag, richtung) {
      return normalisiereDokumentId(
        `${name}_${tag}_${richtung}`
      );
    }


    /*
     * Formular zurücksetzen
     */
    function formularZuruecksetzen() {
      formular.reset();

      plaetzeFeld.value = "1";
      tagFeld.value = "montag";
      richtungFeld.value = "hinfahrt";

      bearbeiteteDokumentId = null;

      formularTitel.textContent = "Fahrt eintragen";
      speichernButton.textContent = "Fahrt speichern";
      abbrechenButton.hidden = true;
    }


    /*
     * Einzelne Fahrt als HTML erzeugen
     */
    function erzeugeFahrtHtml(fahrt) {
      const telefon = fahrt.telefon
        ? `
          <div class="fahrt-zeile">
            <strong>Telefon:</strong>
            <a href="tel:${escapeHtml(fahrt.telefon)}">
              ${escapeHtml(fahrt.telefon)}
            </a>
          </div>
        `
        : "";

      const kinder = fahrt.kinder
        ? `
          <div class="fahrt-zeile">
            <strong>Kinder:</strong>
            ${escapeHtml(fahrt.kinder)}
          </div>
        `
        : "";

      const bemerkung = fahrt.bemerkung
        ? `
          <div class="fahrt-zeile">
            <strong>Bemerkung:</strong>
            ${escapeHtml(fahrt.bemerkung)}
          </div>
        `
        : "";

      return `
        <article class="fahrt">
          <div class="fahrt-name">
            ${escapeHtml(fahrt.name)}
          </div>

          <div class="fahrt-zeile">
            <strong>Uhrzeit:</strong>
            ${escapeHtml(fahrt.uhrzeit)} Uhr
          </div>

          <div class="fahrt-zeile">
            <strong>Freie Plätze:</strong>
            ${escapeHtml(fahrt.plaetze)}
          </div>

          ${telefon}
          ${kinder}
          ${bemerkung}

          <div class="fahrt-aktionen">
            <button
              type="button"
              class="button-bearbeiten"
              data-aktion="bearbeiten"
              data-id="${escapeHtml(fahrt.id)}"
            >
              Bearbeiten
            </button>

            <button
              type="button"
              class="button-loeschen"
              data-aktion="loeschen"
              data-id="${escapeHtml(fahrt.id)}"
            >
              Löschen
            </button>
          </div>
        </article>
      `;
    }


    /*
     * Alle Fahrten darstellen
     */
    function zeigeFahrten(fahrten) {
      const fahrtenNachId = new Map();

      for (const fahrt of fahrten) {
        fahrtenNachId.set(fahrt.id, fahrt);
      }

      let html = "";

      for (const tag of tage) {
        const hinfahrten = fahrten
          .filter((fahrt) => {
            return (
              fahrt.tag === tag.id &&
              fahrt.richtung === "hinfahrt"
            );
          })
          .sort(sortiereFahrten);

        const rueckfahrten = fahrten
          .filter((fahrt) => {
            return (
              fahrt.tag === tag.id &&
              fahrt.richtung === "rueckfahrt"
            );
          })
          .sort(sortiereFahrten);

        html += `
          <section class="tag">
            <h2>${tag.text}</h2>

            <div class="richtungs-grid">
              <div class="richtung">
                <h3>Hinfahrt</h3>

                ${
                  hinfahrten.length > 0
                    ? hinfahrten.map(erzeugeFahrtHtml).join("")
                    : `<div class="leer">Noch keine Hinfahrt eingetragen</div>`
                }
              </div>

              <div class="richtung">
                <h3>Rückfahrt</h3>

                ${
                  rueckfahrten.length > 0
                    ? rueckfahrten.map(erzeugeFahrtHtml).join("")
                    : `<div class="leer">Noch keine Rückfahrt eingetragen</div>`
                }
              </div>
            </div>
          </section>
        `;
      }

      fahrtenListe.className = "";
      fahrtenListe.innerHTML = html;

      /*
       * Map an das Element hängen, damit die Bearbeiten-Funktion
       * den vollständigen Eintrag findet.
       */
      fahrtenListe.fahrtenNachId = fahrtenNachId;
    }


    /*
     * Nach Uhrzeit und anschließend nach Name sortieren.
     */
    function sortiereFahrten(a, b) {
      const zeitVergleich = String(a.uhrzeit ?? "")
        .localeCompare(String(b.uhrzeit ?? ""));

      if (zeitVergleich !== 0) {
        return zeitVergleich;
      }

      return String(a.name ?? "")
        .localeCompare(String(b.name ?? ""), "de");
    }


    /*
     * Fahrten in Echtzeit laden.
     *
     * Bei Änderungen in Firestore wird die Anzeige automatisch
     * aktualisiert.
     */
    function starteLiveAbfrage() {
      const fahrtenAbfrage = query(
        collection(db, COLLECTION_NAME),
        orderBy("name")
      );

      onSnapshot(
        fahrtenAbfrage,

        (snapshot) => {
          const fahrten = snapshot.docs.map((dokument) => {
            return {
              id: dokument.id,
              ...dokument.data()
            };
          });

          zeigeFahrten(fahrten);
        },

        (fehler) => {
          console.error("Fehler beim Laden:", fehler);

          fahrtenListe.className = "ladeanzeige";
          fahrtenListe.textContent =
            "Daten konnten nicht geladen werden.";

          zeigeStatus(
            `Daten konnten nicht geladen werden.\n` +
            `Fehlercode: ${fehler.code || "unbekannt"}\n` +
            `Meldung: ${fehler.message || fehler}`,
            "fehler"
          );
        }
      );
    }


    /*
     * Fahrt speichern
     */
    formular.addEventListener("submit", async (event) => {
      event.preventDefault();

      if (!firebaseBereit || !auth.currentUser) {
        zeigeStatus(
          "Firebase ist noch nicht bereit. Bitte die Seite neu laden.",
          "fehler"
        );
        return;
      }

      const name = nameFeld.value.trim();
      const telefon = telefonFeld.value.trim();
      const tag = tagFeld.value;
      const richtung = richtungFeld.value;
      const uhrzeit = uhrzeitFeld.value;
      const plaetze = Number(plaetzeFeld.value);
      const kinder = kinderFeld.value.trim();
      const bemerkung = bemerkungFeld.value.trim();

      if (!name) {
        zeigeStatus(
          "Bitte einen Namen eingeben.",
          "fehler"
        );
        nameFeld.focus();
        return;
      }

      if (!uhrzeit) {
        zeigeStatus(
          "Bitte eine Uhrzeit auswählen.",
          "fehler"
        );
        uhrzeitFeld.focus();
        return;
      }

      if (
        !Number.isInteger(plaetze) ||
        plaetze < 0 ||
        plaetze > 20
      ) {
        zeigeStatus(
          "Bitte eine gültige Anzahl freier Plätze eingeben.",
          "fehler"
        );
        plaetzeFeld.focus();
        return;
      }

      /*
       * Neue feste ID aus Name, Tag und Richtung erzeugen.
       */
      const neueDokumentId = erzeugeDokumentId(
        name,
        tag,
        richtung
      );

      if (!neueDokumentId) {
        zeigeStatus(
          "Aus den eingegebenen Daten konnte keine Dokument-ID erzeugt werden.",
          "fehler"
        );
        return;
      }

      speichernButton.disabled = true;
      speichernButton.textContent = "Wird gespeichert …";

      try {
        /*
         * Wird beim Bearbeiten der Name, Tag oder die Richtung
         * verändert, ändert sich auch die Dokument-ID.
         *
         * In diesem Fall wird das alte Dokument gelöscht.
         */
        if (
          bearbeiteteDokumentId &&
          bearbeiteteDokumentId !== neueDokumentId
        ) {
          await deleteDoc(
            doc(
              db,
              COLLECTION_NAME,
              bearbeiteteDokumentId
            )
          );
        }

        /*
         * setDoc() mit fester Dokument-ID:
         *
         * Ist die ID vorhanden, wird das Dokument aktualisiert.
         * Ist die ID nicht vorhanden, wird es neu angelegt.
         */
        await setDoc(
          doc(
            db,
            COLLECTION_NAME,
            neueDokumentId
          ),
          {
            name,
            telefon,
            tag,
            richtung,
            uhrzeit,
            plaetze,
            kinder,
            bemerkung,

            /*
             * Benutzer-ID des anonym angemeldeten Benutzers
             */
            benutzerId: auth.currentUser.uid,

            aktualisiertAm: serverTimestamp()
          },
          {
            merge: true
          }
        );

        formularZuruecksetzen();

        zeigeStatus(
          "Die Fahrt wurde erfolgreich gespeichert.",
          "erfolg"
        );

        window.setTimeout(() => {
          versteckeStatus();
        }, 3500);
      } catch (fehler) {
        console.error("Fehler beim Speichern:", fehler);

        zeigeStatus(
          `Die Fahrt konnte nicht gespeichert werden.\n` +
          `Fehlercode: ${fehler.code || "unbekannt"}\n` +
          `Meldung: ${fehler.message || fehler}`,
          "fehler"
        );
      } finally {
        speichernButton.disabled = false;
        speichernButton.textContent = bearbeiteteDokumentId
          ? "Änderungen speichern"
          : "Fahrt speichern";
      }
    });


    /*
     * Bearbeiten und Löschen über Event-Delegation.
     */
    fahrtenListe.addEventListener("click", async (event) => {
      const button = event.target.closest("button[data-aktion]");

      if (!button) {
        return;
      }

      const aktion = button.dataset.aktion;
      const dokumentId = button.dataset.id;

      if (!dokumentId) {
        return;
      }

      const fahrt = fahrtenListe.fahrtenNachId?.get(dokumentId);

      if (aktion === "bearbeiten") {
        if (!fahrt) {
          zeigeStatus(
            "Der Eintrag wurde nicht gefunden.",
            "fehler"
          );
          return;
        }

        bearbeiteteDokumentId = dokumentId;

        nameFeld.value = fahrt.name ?? "";
        telefonFeld.value = fahrt.telefon ?? "";
        tagFeld.value = fahrt.tag ?? "montag";
        richtungFeld.value = fahrt.richtung ?? "hinfahrt";
        uhrzeitFeld.value = fahrt.uhrzeit ?? "";
        plaetzeFeld.value = fahrt.plaetze ?? 1;
        kinderFeld.value = fahrt.kinder ?? "";
        bemerkungFeld.value = fahrt.bemerkung ?? "";

        formularTitel.textContent = "Fahrt bearbeiten";
        speichernButton.textContent = "Änderungen speichern";
        abbrechenButton.hidden = false;

        window.scrollTo({
          top: 0,
          behavior: "smooth"
        });

        nameFeld.focus();
      }

      if (aktion === "loeschen") {
        if (!fahrt) {
          zeigeStatus(
            "Der Eintrag wurde nicht gefunden.",
            "fehler"
          );
          return;
        }

        const bestaetigt = window.confirm(
          `Soll die Fahrt von ${fahrt.name} wirklich gelöscht werden?`
        );

        if (!bestaetigt) {
          return;
        }

        button.disabled = true;
        button.textContent = "Wird gelöscht …";

        try {
          await deleteDoc(
            doc(
              db,
              COLLECTION_NAME,
              dokumentId
            )
          );

          if (bearbeiteteDokumentId === dokumentId) {
            formularZuruecksetzen();
          }

          zeigeStatus(
            "Die Fahrt wurde gelöscht.",
            "erfolg"
          );

          window.setTimeout(() => {
            versteckeStatus();
          }, 3000);
        } catch (fehler) {
          console.error("Fehler beim Löschen:", fehler);

          zeigeStatus(
            `Die Fahrt konnte nicht gelöscht werden.\n` +
            `Fehlercode: ${fehler.code || "unbekannt"}\n` +
            `Meldung: ${fehler.message || fehler}`,
            "fehler"
          );

          button.disabled = false;
          button.textContent = "Löschen";
        }
      }
    });


    /*
     * Bearbeitung abbrechen
     */
    abbrechenButton.addEventListener("click", () => {
      formularZuruecksetzen();
      versteckeStatus();
    });


    /*
     * Anonyme Anmeldung
     */
    onAuthStateChanged(auth, async (benutzer) => {
      if (benutzer && !firebaseBereit) {
        firebaseBereit = true;
        speichernButton.disabled = false;

        versteckeStatus();
        starteLiveAbfrage();
      }
    });


    /*
     * App starten
     */
    async function starteApp() {
      zeigeStatus(
        "Verbindung zu Firebase wird hergestellt …",
        "info"
      );

      try {
        await signInAnonymously(auth);
      } catch (fehler) {
        console.error("Anmeldung fehlgeschlagen:", fehler);

        fahrtenListe.textContent =
          "Firebase-Anmeldung fehlgeschlagen.";

        zeigeStatus(
          `Anmeldung fehlgeschlagen.\n` +
          `Fehlercode: ${fehler.code || "unbekannt"}\n` +
          `Meldung: ${fehler.message || fehler}\n\n` +
          `Bitte in Firebase Authentication die anonyme Anmeldung aktivieren.`,
          "fehler"
        );
      }
    }

    starteApp();
  </script>
</body>
</html>
