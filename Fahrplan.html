<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fahrdienst · Feriencamp Auricher Berg</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --moos:#22392c;
    --kiefer:#3f6b52;
    --kiefer-hell:#5c8a6b;
    --birke:#f4efe4;
    --lagerfeuer:#e2872f;
    --lagerfeuer-hell:#f1a862;
    --linie:#c9c0aa;
    --schatten: 0 2px 10px rgba(34,57,44,0.15);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--birke);
    color:var(--moos);
    font-family:'Work Sans', sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  header{
    background:var(--moos);
    color:var(--birke);
    padding:48px 24px 64px;
    text-align:center;
    position:relative;
    overflow:hidden;
  }
  header::after{
    content:"";
    position:absolute;
    bottom:0; left:0; right:0;
    height:28px;
    background:var(--birke);
    clip-path: polygon(0 100%, 3% 0, 6% 100%, 9% 0, 12% 100%, 15% 0, 18% 100%, 21% 0, 24% 100%, 27% 0, 30% 100%, 33% 0, 36% 100%, 39% 0, 42% 100%, 45% 0, 48% 100%, 51% 0, 54% 100%, 57% 0, 60% 100%, 63% 0, 66% 100%, 69% 0, 72% 100%, 75% 0, 78% 100%, 81% 0, 84% 100%, 87% 0, 90% 100%, 93% 0, 96% 100%, 99% 0, 100% 100%);
  }
  header h1{
    font-family:'Fraunces', serif;
    font-weight:700;
    font-size:clamp(1.8rem, 4vw, 2.6rem);
    margin:0 0 8px;
    letter-spacing:-0.01em;
  }
  header p{
    margin:0;
    font-size:1.05rem;
    color:var(--lagerfeuer-hell);
    font-weight:500;
  }
  main{
    max-width:920px;
    margin:0 auto;
    padding:32px 20px 80px;
  }
  .name-bar{
    background:#fff;
    border:1px solid var(--linie);
    border-radius:14px;
    padding:18px 20px;
    margin:-40px auto 36px;
    max-width:560px;
    box-shadow:var(--schatten);
    display:flex;
    gap:10px;
    align-items:center;
  }
  .name-bar label{
    font-weight:600;
    font-size:0.95rem;
    white-space:nowrap;
  }
  .name-bar input{
    flex:1;
    border:1.5px solid var(--linie);
    border-radius:8px;
    padding:10px 12px;
    font-size:1rem;
    font-family:inherit;
    color:var(--moos);
  }
  .name-bar input:focus{
    outline:2px solid var(--kiefer);
    outline-offset:1px;
  }
  .status{
    text-align:center;
    font-size:0.9rem;
    color:var(--kiefer);
    margin-bottom:24px;
    min-height:1.2em;
  }
  .days{
    display:grid;
    grid-template-columns:1fr;
    gap:20px;
  }
  .day-card{
    background:#fff;
    border-radius:16px;
    box-shadow:var(--schatten);
    overflow:hidden;
    border:1px solid var(--linie);
  }
  .day-head{
    background:var(--kiefer);
    color:var(--birke);
    padding:14px 20px;
    display:flex;
    align-items:baseline;
    gap:10px;
  }
  .day-head .eyebrow{
    font-size:0.72rem;
    text-transform:uppercase;
    letter-spacing:0.08em;
    opacity:0.75;
    font-weight:600;
  }
  .day-head h2{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:1.3rem;
    margin:0;
  }
  .slots{
    display:grid;
    grid-template-columns:1fr 1fr;
  }
  .slot{
    padding:16px 18px 18px;
  }
  .slot + .slot{
    border-left:1px dashed var(--linie);
  }
  .slot-title{
    display:flex;
    align-items:center;
    gap:8px;
    font-weight:600;
    font-size:0.92rem;
    margin-bottom:10px;
    color:var(--moos);
  }
  .slot-title .icon{
    font-size:1.1rem;
  }
  .entries{
    list-style:none;
    margin:0 0 12px;
    padding:0;
    display:flex;
    flex-direction:column;
    gap:6px;
    min-height:8px;
  }
  .entries li{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:var(--birke);
    border-radius:8px;
    padding:6px 10px;
    font-size:0.92rem;
  }
  .entries li button{
    background:none;
    border:none;
    color:#a35a2d;
    cursor:pointer;
    font-size:0.85rem;
    padding:0 2px;
    font-weight:600;
  }
  .entries li button:hover{
    text-decoration:underline;
  }
  .empty{
    color:#8a8272;
    font-size:0.85rem;
    font-style:italic;
    margin:0 0 12px;
  }
  .add-btn{
    width:100%;
    background:var(--lagerfeuer);
    color:#fff;
    border:none;
    border-radius:8px;
    padding:9px 10px;
    font-weight:600;
    font-size:0.88rem;
    cursor:pointer;
    font-family:inherit;
    transition:background 0.15s;
  }
  .add-btn:hover{
    background:#c96f1f;
  }
  .add-btn:focus-visible{
    outline:2px solid var(--moos);
    outline-offset:2px;
  }
  .add-btn:disabled{
    background:#d8d2c2;
    color:#8a8272;
    cursor:not-allowed;
  }
  @media (max-width:520px){
    .slots{grid-template-columns:1fr;}
    .slot + .slot{border-left:none; border-top:1px dashed var(--linie);}
    .name-bar{flex-direction:column; align-items:stretch;}
  }
</style>
</head>
<body>

<header>
  <h1>Fahrdienst Feriencamp Auricher Berg</h1>
  <p>Eine Woche · Montag bis Sonntag · Bringen &amp; Abholen</p>
</header>

<main>
  <div class="name-bar">
    <label for="nameInput">Dein Name</label>
    <input type="text" id="nameInput" placeholder="z. B. Anna Meyer" autocomplete="name">
  </div>
  <div class="status" id="status">Lade Fahrplan …</div>

  <div class="days" id="days"></div>
</main>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
  import {
    getFirestore, collection, addDoc, deleteDoc, doc,
    onSnapshot, query, orderBy, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBMSJyaSeG-U2dRqGdh89pTbeyK2UYWBeg",
    authDomain: "auricherberg.firebaseapp.com",
    projectId: "auricherberg",
    storageBucket: "auricherberg.firebasestorage.app",
    messagingSenderId: "644337434354",
    appId: "1:644337434354:web:5699080584b33487061a6b",
    measurementId: "G-SVJLLXX6K7"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const col = collection(db, "fahrdienst_eintraege");

  const DAYS = ["Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag","Sonntag"];
  const SLOTS = [
    { key: "bringen", label: "Bringen", icon: "🌅" },
    { key: "abholen", label: "Abholen", icon: "🌇" }
  ];

  const daysEl = document.getElementById("days");
  const statusEl = document.getElementById("status");
  const nameInput = document.getElementById("nameInput");

  // Grundgerüst der Karten aufbauen
  DAYS.forEach(day => {
    const card = document.createElement("div");
    card.className = "day-card";
    card.innerHTML = `
      <div class="day-head">
        <span class="eyebrow">Tag</span>
        <h2>${day}</h2>
      </div>
      <div class="slots">
        ${SLOTS.map(s => `
          <div class="slot" data-day="${day}" data-slot="${s.key}">
            <div class="slot-title"><span class="icon">${s.icon}</span> ${s.label}</div>
            <ul class="entries"></ul>
            <p class="empty" hidden>Noch niemand eingetragen</p>
            <button class="add-btn" type="button">+ Eintragen</button>
          </div>
        `).join("")}
      </div>
    `;
    daysEl.appendChild(card);
  });

  // Wird bei jedem Snapshot aktualisiert: wie viele Einträge hat welcher Slot
  let slotCounts = {};

  // Klick-Handler für Eintragen-Buttons
  daysEl.addEventListener("click", async (e) => {
    if (!e.target.classList.contains("add-btn")) return;
    const name = nameInput.value.trim();
    if (!name) {
      statusEl.textContent = "Bitte zuerst deinen Namen eingeben.";
      nameInput.focus();
      return;
    }
    const slotEl = e.target.closest(".slot");
    const day = slotEl.dataset.day;
    const slot = slotEl.dataset.slot;
    const key = day + slot;
    if ((slotCounts[key] || 0) >= 1) {
      statusEl.textContent = "Für diesen Termin ist bereits jemand eingetragen.";
      return;
    }
    e.target.disabled = true;
    try {
      await addDoc(col, { day, slot, name, timestamp: serverTimestamp() });
      statusEl.textContent = "";
    } catch (err) {
      statusEl.textContent = "Fehler beim Speichern: " + err.message;
      e.target.disabled = false;
    }
  });

  // Löschen eines eigenen Eintrags – mit Bestätigung
  daysEl.addEventListener("click", async (e) => {
    if (!e.target.classList.contains("remove-btn")) return;
    const id = e.target.dataset.id;
    const name = e.target.dataset.name;
    const confirmed = window.confirm(`Eintrag von "${name}" wirklich entfernen?`);
    if (!confirmed) return;
    try {
      await deleteDoc(doc(db, "fahrdienst_eintraege", id));
    } catch (err) {
      statusEl.textContent = "Fehler beim Entfernen: " + err.message;
    }
  });

  // Live-Daten
  const q = query(col, orderBy("timestamp", "asc"));
  onSnapshot(q, (snapshot) => {
    // Alle Listen leeren
    document.querySelectorAll(".slot").forEach(slotEl => {
      slotEl.querySelector(".entries").innerHTML = "";
    });

    const counts = {};
    snapshot.forEach(docSnap => {
      const data = docSnap.data();
      const selector = `.slot[data-day="${data.day}"][data-slot="${data.slot}"]`;
      const slotEl = daysEl.querySelector(selector);
      if (!slotEl) return;
      const list = slotEl.querySelector(".entries");
      const li = document.createElement("li");
      li.innerHTML = `<span>${escapeHtml(data.name)}</span>
        <button class="remove-btn" data-id="${docSnap.id}" data-name="${escapeHtml(data.name)}" title="Eintrag entfernen">✕</button>`;
      list.appendChild(li);
      const key = data.day + data.slot;
      counts[key] = (counts[key] || 0) + 1;
    });
    slotCounts = counts;

    document.querySelectorAll(".slot").forEach(slotEl => {
      const list = slotEl.querySelector(".entries");
      const empty = slotEl.querySelector(".empty");
      const addBtn = slotEl.querySelector(".add-btn");
      const key = slotEl.dataset.day + slotEl.dataset.slot;
      const belegt = (counts[key] || 0) >= 1;
      empty.hidden = list.children.length > 0;
      addBtn.disabled = belegt;
      addBtn.textContent = belegt ? "Bereits belegt" : "+ Eintragen";
    });

    statusEl.textContent = "";
  }, (err) => {
    statusEl.textContent = "Verbindung fehlgeschlagen: " + err.message;
  });

  function escapeHtml(str){
    const d = document.createElement("div");
    d.textContent = str;
    return d.innerHTML;
  }
</script>

</body>
</html>
